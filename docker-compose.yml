services:
  backend:
    build:
      context: ./backend
    env_file: .env
    container_name: pruninglab-backend
    ports:
      - "8000:8000"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - USE_4BIT=1
      - PRUNING_DATA_DIR=/app/pruning/data/processed
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - ./backend:/app
      - ./pruning:/app/pruning
      - hf-cache:/root/.cache/huggingface
    runtime: nvidia
    command: uvicorn main:app --host 0.0.0.0 --port 8000

volumes:
  hf-cache:
