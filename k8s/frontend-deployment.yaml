apiVersion: v1
kind: Service
metadata:
   name: frontend
spec:
   selector:
      app: frontend
   ports:
      - port: 80
        targetPort: 80
   type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
   name: frontend
spec:
   replicas: 1
   selector:
      matchLabels:
         app: frontend
   template:
      metadata:
         labels:
            app: frontend
      spec:
         containers:
            - name: frontend
              image: europe-central2-docker.pkg.dev/nomadic-memento-476510-h5/projektr/frontend:latest
              ports:
                 - containerPort: 80
